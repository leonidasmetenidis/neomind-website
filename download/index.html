<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting… · Neomind</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="../assets/icons/special/neomind_app_watermark_icon.png">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      text-align: center;
      padding: 1.5rem;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 0; opacity: 0.7; font-size: 0.95rem; }
    a { color: #fff; }
    .fallback { margin-top: 0.5rem; opacity: 0.55; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner" aria-hidden="true"></div>
    <p>Taking you to the app…</p>
    <p class="fallback">
      Not redirected? <a id="manual-link" href="/">Continue here</a>.
    </p>
  </div>

  <script>
    (function () {
      // ============================================================
      // TODO before shipping: replace these placeholder store URLs.
      // See docs/pre-launch-todos.md
      // ============================================================
      var APP_STORE_URL = "https://apps.apple.com/app/idXXXXXXXXXX";          // PLACEHOLDER — iOS App Store
      var PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.neomind.PLACEHOLDER"; // PLACEHOLDER — Google Play
      var WEB_FALLBACK_URL = "/";                                              // Desktop / unknown devices → homepage

      // Carry through any query params (e.g. ?utm_source=tiktok) so
      // they survive the redirect for attribution.
      var query = window.location.search || "";

      function withQuery(url) {
        if (!query) return url;
        return url + (url.indexOf("?") === -1 ? "?" : "&") + query.slice(1);
      }

      var ua = navigator.userAgent || navigator.vendor || "";
      var target;

      if (/android/i.test(ua)) {
        target = PLAY_STORE_URL;
      } else if (/iPad|iPhone|iPod/i.test(ua) && !window.MSStream) {
        target = APP_STORE_URL;
      } else {
        // Desktop, or anything we can't identify.
        target = WEB_FALLBACK_URL;
      }

      target = withQuery(target);

      // Update the manual fallback link in case the auto-redirect is
      // blocked (some in-app browsers / no-JS-after-load edge cases).
      var manual = document.getElementById("manual-link");
      if (manual) manual.setAttribute("href", target);

      // replace() so this page doesn't sit in the back-button history.
      window.location.replace(target);
    })();
  </script>

  <noscript>
    <div style="text-align:center;padding:2rem;">
      <p>JavaScript is required to continue.
      <a href="/">Visit the Neomind website</a>.</p>
    </div>
  </noscript>
</body>
</html>
