<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neomind · Mindset App</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/neomind_favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="header">
    <a href="#" class="header__logo" aria-label="neomind home">
      <img src="assets/icons/neomind_logo.svg" alt="neomind">
    </a>

    <div class="header__actions">
      <button class="lang-switch" type="button">
        <span class="lang-switch__flag">🇺🇸</span>
        <span>EN</span>
      </button>
      <button class="btn-try" type="button">Try for free</button>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero__headline">Build a mindset<br>that changes your life.</h1>
    <p class="hero__subheadline">Neomind is the app for affirmations, visualization, and AI-guided mindset shifts, designed to help you think bigger, feel better, and become who you're meant to be.</p>

    <div class="hero__badges">
      <a href="#" class="hero__badge" aria-label="Get it on Google Play">
        <img src="assets/images/en/googleplay_badge.svg" alt="Get it on Google Play">
      </a>
      <a href="#" class="hero__badge" aria-label="Download on the App Store">
        <img src="assets/images/en/appstore_badge.svg" alt="Download on the App Store">
      </a>
    </div>

    <img src="assets/images/en/hero.png" alt="Neomind app" class="hero__image">
  </section>
</body>
</html>
